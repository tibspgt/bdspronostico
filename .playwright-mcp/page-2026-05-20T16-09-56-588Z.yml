nt-family:'Azeret Mono',monospace;font-size:0.52rem;color:var(--text-muted);font-weight:400;\" title=\"Goal average\">+/-</th> <th style=\"padding:0.3rem 0.4rem;text-align:center;font-family:'Azeret Mono',monospace;font-size:0.52rem;color:var(--gold);font-weight:400;\">PTS</th> <th style=\"padding:0.3rem 0.4rem;text-align:center;font-family:'Azeret Mono',monospace;font-size:0.52rem;color:var(--text-muted);font-weight:400;\">Q.</th> </tr> </thead> <tbody>${thirdsRows}</tbody> </table> </div> <div style=\"margin-top:0.6rem;font-family:'Azeret Mono',monospace;font-size:0.58rem;color:var(--text-muted);padding:0 0.2rem;\"> ✓ = qualifié pour les seizièmes de finale · ✗ = éliminé · Classement : pts → +/- → BP → nom </div> </div>`; } container.innerHTML = html; } function togglePreds(matchId) { const el = document.getElementById(`preds-${matchId}`); const btn = document.getElementById(`btn-${matchId}`); if (!el) return; const open = el.style.display !== 'none'; el.style.display = open ? 'none' : 'block'; if (btn) btn.textContent = open ? 'Voir les paris ▾' : 'Masquer les paris ▴'; } function renderLbRow(p, rank, full = false, showTrend = true) { const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'other'; const rankText = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank; const meClass = p.me ? 'me' : ''; const podiumStyle = rank === 1 ? 'background:rgba(232,160,32,0.08);outline:1px solid rgba(232,160,32,0.20);' : rank === 2 ? 'background:rgba(192,192,192,0.07);outline:1px solid rgba(192,192,192,0.15);' : rank === 3 ? 'background:rgba(205,127,50,0.07);outline:1px solid rgba(205,127,50,0.15);' : ''; let trendHtml = ''; if (showTrend && p.rankPrev != null) { const diff = p.rankPrev - rank; // positif = a gagné des places if (diff > 0) { trendHtml = `<div class=\"lb-trend-badge up\">▲${diff}</div>`; } else if (diff < 0) { trendHtml = `<div class=\"lb-trend-badge down\">▼${Math.abs(diff)}</div>`; } else { trendHtml = `<div class=\"lb-trend-badge same\">—</div>`; } } return ` <div class=\"lb-row ${meClass}\" style=\"${podiumStyle}\"> ${trendHtml} <div class=\"lb-rank ${rankClass}\">${rankText}</div> <div class=\"lb-avatar\" style=\"background:${p.color}20;border:1px solid ${p.color}40;\">${renderAvatar(p.emoji, p.avatar_url)}</div> <div class=\"lb-info\"> <div class=\"lb-name ${p.me ? 'me' : ''}\" style=\"${rank === 1 && !full ? 'font-size:1.05rem;' : ''}\">${p.name}${p.emoji ? `<img src=\"https://flagcdn.com/w20/${p.emoji}.png\" style=\"height:13px;border-radius:2px;vertical-align:middle;margin-left:5px;margin-right:2px;\" />` : ''}${p.has_bet ? ' <span title=\"A parié\" style=\"font-size:0.8rem;\">💰</span>' : ''}${p.me ? ' <span style=\"color:var(--text-muted);font-size:0.75rem;\">(toi)</span>' : ''}</div> ${full ? `<div class=\"lb-stats\"> <span class=\"lb-chip lb-chip-exact\">${p.exact}× exact</span> <span class=\"lb-chip-sep\">·</span> <span class=\"lb-chip\">${p.gap}× écart</span> <span class=\"lb-chip-sep\">·</span> <span class=\"lb-chip\">${p.win}× vainq.</span> ${p.motmOk > 0 ? `<span class=\"lb-chip-sep\">·</span><span class=\"lb-chip lb-chip-motm\">${p.motmOk}× MOTM</span>` : ''} ${p.scorer > 0 ? `<span class=\"lb-chip-sep\">·</span><span class=\"lb-chip lb-chip-scorer\">⚽ ${p.scorer} pts</span>` : ''} ${p.bestBet ? `<span class=\"lb-chip-sep\">·</span><span class=\"lb-chip lb-chip-best\" title=\"Meilleur pari\">★ ${p.bestBet.home.slice(0,3).toUpperCase()} ${p.bestBet.predHome}-${p.bestBet.predAway} ${p.bestBet.away.slice(0,3).toUpperCase()} +${p.bestBet.pts}pts</span>` : ''} </div>` : ''} </div> <div class=\"lb-score-col\"> <div class=\"lb-points\" style=\"${rank === 1 && !full ? 'font-size:1.8rem;' : ''}\">${Number.isInteger(p.points) ? p.points : p.points.toFixed(2)}</div> <div class=\"lb-pts-label\">pts</div> </div> </div>`; } // ════════════════════════════════════════ // LOGIQUE // ════════════════════════════════════════ // Convertit un code de règle en texte lisible (\"1A\" → \"1er Groupe A\", \"W73\" → \"Vainqueur M73\", etc.) function ruleToLabel(code) { if (!code) return 'TBD'; const m1 = code.match(/^([12])([A-L])$/); if (m1) return (m1[1] === '1' ? '1er' : '2e') + ' Groupe ' + m1[2]; const m2 = code.match(/^3BEST_(\\d+)$/); if (m2) return 'Meilleur 3e #' + m2[1]; const m3 = code.match(/^W(\\d+)$/); if (m3) return 'Vainqueur M' + m3[1]; const m4 = code.match(/^L(\\d+)$/); if (m4) return 'Perdant M' + m4[1]; return code; } // Calcule les classements de groupe puis résout automatiquement // tous les slots de phases finales dont les équipes sont encore \"TBD\". // Appelé après chaque mise à jour de score (temps réel) et sur demande. async function resolveKnockoutSlots() { // ─ Étape 1 : construire les classements par groupe ─ const groupMatches = state.matches.filter(m => m.round <= 3 && m.status === 'finished' && m.score_home != null); const rawMap = {}; for (const g of 'ABCDEFGHIJKL') rawMap[g] = {}; for (const m of groupMatches) { const grp = m.match_group.replace('Groupe ', ''); if (!rawMap[grp]) continue; if (!rawMap[grp][m.home]) rawMap[grp][m.home] = { team: m.home, flag: m.home_flag, pts: 0, gd: 0, gf: 0 }; if (!rawMap[grp][m.away]) rawMap[grp][m.away] = { team: m.away, flag: m.away_flag, pts: 0, gd: 0, gf: 0 }; rawMap[grp][m.home].gf += m.score_home; rawMap[grp][m.home].gd += m.score_home - m.score_away; rawMap[grp][m.away].gf += m.score_away; rawMap[grp][m.away].gd += m.score_away - m.score_home; if (m.score_home > m.score_away) rawMap[grp][m.home].pts += 3; else if (m.score_home === m.score_away) { rawMap[grp][m.home].pts += 1; rawMap[grp][m.away].pts += 1; } else rawMap[grp][m.away].pts += 3; } const standings = {}; for (const [g, teams] of Object.entries(rawMap)) { standings[g] = Object.values(teams).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf); } // ─ Étape 2 : meilleurs 8 troisièmes ─ const thirds = Object.entries(standings) .filter(([, s]) => s.length >= 3) .map(([g, s]) => ({ ...s[2], group: g })) .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf) .slice(0, 8); // ─ Étape 3 : résolution d'un code de règle → {team, flag} ─ function resolveTeam(code) { const m1 = code.match(/^([12])([A-L])$/); if (m1) return standings[m1[2]]?.[parseInt(m1[1]) - 1] || null; const m2 = code.match(/^3BEST_(\\d+)$/); if (m2) return thirds[parseInt(m2[1]) - 1] || null; const mW = code.match(/^W(\\d+)$/); if (mW) { const src = state.matches.find(m => m.id === parseInt(mW[1]) && m.status === 'finished' && m.score_home != null); if (!src) return null; return src.score_home > src.score_away ? { team: src.home, flag: src.home_flag } : { team: src.away, flag: src.away_flag }; } const mL = code.match(/^L(\\d+)$/); if (mL) { const src = state.matches.find(m => m.id === parseInt(mL[1]) && m.status === 'finished' && m.score_home != null); if (!src) return null; return src.score_home < src.score_away ? { team: src.home, flag: src.home_flag } : { team: src.away, flag: src.away_flag }; } return null; } // ─ Étape 4 : mise à jour des slots TBD en DB ─ const knockouts = state.matches.filter(m => m.round >= 4 && m.knockout_rule); let updated = 0; for (const match of knockouts) { if (match.home !== 'TBD' && match.away !== 'TBD') continue; let rule; try { rule = JSON.parse(match.knockout_rule); } catch(e) { continue; } const upd = {}; if (match.home === 'TBD') { const t = resolveTeam(rule.h); if (t) { upd.home = t.team; upd.home_flag = t.flag; } } if (match.away === 'TBD') { const t = resolveTeam(rule.a); if (t) { upd.away = t.team; upd.away_flag = t.flag; } } if (!Object.keys(upd).length) continue; const { error } = await sb.from('matches').update(upd).eq('id', match.id); if (!error) { Object.assign(match, upd); updated++; } } if (updated > 0) { const { data } = await sb.from('matches').select('*').order('id'); if (data) state.matches = data; renderAll(); showToast(`${updated} slot${updated > 1 ? 's' : ''} de phases finales mis à jour !`, 'success'); } return updated; } async function triggerResolve(btn) { const orig = btn.textContent; btn.textContent = 'Calcul…'; btn.disabled = true; const n = await resolveKnockoutSlots(); if (n === 0) showToast('Aucun nouveau slot à résoudre pour l\\'instant', 'default'); btn.textContent = orig; btn.disabled = false; } function calcPoints(pred, actual, penaltyWinner = null, penaltyPick = null) { if (!actual) return null; const predGap = pred.h - pred.a; const actualGap = actual.h - actual.a; // Match nul en phase éliminatoire → les pénaltys déterminent le vainqueur const isPenDraw = actualGap === 0 && penaltyWinner != null; if (pred.h === actual.h && pred.a === actual.a) { // Score exact if (isPenDraw) return penaltyPick === penaltyWinner ? 4 : 2; return 4; } const actualSign = isPenDraw ? (penaltyWinner === 'home' ? 1 : -1) : Math.sign(actualGap); const predSign = Math.sign(predGap); // Pronostic nul sans score exact, avec match nul réel → check du pick pens if (predSign === 0 && isPenDraw) return penaltyPick === penaltyWinner ? 3 : 2; // Pronostic nul en phase de groupes (non exact) → bon résultat + bon écart (toujours 0) = 2 pts if (predSign === 0 && actualSign === 0) return 2; // Pronostic nul + pick pénaltys correct, mais victoire sèche → bon vainqueur = 1 pt if (predSign === 0 && penaltyPick) { const pickSign = penaltyPick === 'home' ? 1 : -1; if (pickSign === actualSign) return 1; } const sameWinner = predSign === actualSign && predSign !== 0; if (sameWinner && predGap === actualGap && !isPenDraw) return 2; if (sameWinner && isPenDraw) return 1; if (sameWinner) return 1; return 0; } const FUNKY_MATCHES = [ ['États-Unis', 'Australie'], ['Haïti', 'Brésil'], ['Japon', 'Suède'], ['Nouvelle-Zélande', 'Belgique'], ['Allemagne', 'Curaçao'], ]; const BIG_MATCHES = [ ['Brésil', 'Maroc'], ['Pays-Bas', 'Japon'], ['Argentine', 'Algérie'], ['Angleterre', 'Croatie'], ['Allemagne', \"Côte d'Ivoire\"], ['Pays-Bas', 'Suède'], ['Norvège', 'Sénégal'], ['Angleterre', 'Ghana'], ['Équateur', 'Allemagne'], ['Uruguay', 'Espagne'], ['Colombie', 'Portugal'], ]; function isFranceMatch(match) { return match.home === 'France' || match.away === 'France'; } function isOpeningMatch(match) { const teams = [match.home, match.away]; return teams.includes('Mexique') && teams.includes('Afrique du Sud'); } function isCanadaOpeningMatch(match) { const teams = [match.home, match.away]; return teams.includes('Canada') && teams.includes('Bosnie-Herzégovine'); } function isUSAOpeningMatch(match) { const teams = [match.home, match.away]; return teams.includes('États-Unis') && teams.includes('Paraguay'); } function isFunkyMatch(match) { const teams = [match.home, match.away]; return FUNKY_MATCHES.some(([a, b]) => teams.includes(a) && teams.includes(b)); } function isBigMatch(match) { const teams = [match.home, match.away]; return BIG_MATCHES.some(([a, b]) => teams.includes(a) && teams.includes(b)); } function getMatchBonus(match) { if (match.round >= 4) { if (match.round === 4) return 1.25; if (match.round === 5) return 1.5; if (match.round === 6) return 1.75; return 2; } if (isFranceMatch(match)) return 2; if (isOpeningMatch(match)) return 1.5; if (isCanadaOpeningMatch(match)) return 1.5; if (isUSAOpeningMatch(match)) return 1.5; if (isBigMatch(match)) return 1.5; if (isFunkyMatch(match)) return 1.25; return 1; } function getOddsMultiplier(actual, match) { if (!match.odds_home && !match.odds_draw && !match.odds_away) return null; if (actual.h > actual.a) return parseFloat(match.odds_home) || null; if (actual.h < actual.a) return parseFloat(match.odds_away) || null; return parseFloat(match.odds_draw) || null; } // ════════════════════════════════════════ // BONUS SPÉCIAUX // ════════════════════════════════════════ function startBonusCountdown() { function tick() { const el = document.getElementById('bonus-countdown'); if (!el) return; const diff = BONUS_DEADLINE - new Date(); if (diff <= 0) { el.innerHTML = `<span style=\"color:var(--red)\">🔒 PARIS FERMÉS — délai expiré le 12 juin à 21h00 (heure française)</span>`; renderBonus(); // re-render pour verrouiller les inputs return; } const j = Math.floor(diff / 86400000); const h = Math.floor((diff % 86400000) / 3600000); const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000); const urgent = diff < 3600000; // dernière heure → rouge const color = urgent ? 'var(--red)' : diff < 86400000 ? 'var(--gold)' : 'var(--text-dim)'; const parts = j > 0 ? `${j}j ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s` : `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`; el.innerHTML = `<span style=\"color:${color}\">⏱ PARIS OUVERTS — fermeture dans ${parts} (13 juin · 21h00 FR)</span>`; } tick(); setInterval(tick, 1000); } function startBracketCountdown() { function unit(val, lbl, urgent) { return `<div class=\"bsim-cd-unit\"><span class=\"bsim-cd-val${urgent?' urgent':''}\">${String(val).padStart(2,'0')}</span><span class=\"bsim-cd-ulbl\">${lbl}</span></div>`; } function tick() { const el = document.getElementById('bsim-countdown-timer'); if (!el) return; const diff = BRACKET_DEADLINE - new Date(); if (diff <= 0) { el.remove(); renderBsimSection(); return; } const j = Math.floor(diff / 86400000); const h = Math.floor((diff % 86400000) / 3600000); const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000); const urgent = diff < 3600000; const sep = `<span class=\"bsim-cd-sep\">:</span>`; el.innerHTML = `<div class=\"bsim-cd-bar\"> <div class=\"bsim-cd-label\">⏱ BRACKET FERME LE 11 JUIN À 21H00</div> <div class=\"bsim-cd-digits\"> ${unit(j,'JOURS',urgent)} ${sep} ${unit(h,'HEURES',urgent)} ${sep} ${unit(m,'MIN',urgent)} ${sep} ${unit(s,'SEC',urgent)} </div> </div>`; } tick(); setInterval(tick, 1000); } function getBonusPoints(playerId) { let bonus = 0; for (const [cat, answer] of Object.entries(state.specialResults)) { if (!answer) continue; const bet = state.specialBets.find(b => b.player_id === playerId && b.category === cat); if (bet && bet.pick.toLowerCase().trim() === answer.toLowerCase().trim()) bonus += 10; } return bonus; } function getMotmPoints(playerId) { let pts = 0; for (const m of state.matches) { if (!m.motm_result) continue; const bet = state.motmBets.find(b => b.player_id === playerId && b.match_id === m.id); if (bet && bet.pick_player_name.toLowerCase().trim() === m.motm_result.toLowerCase().trim()) pts += MOTM_PTS; } return pts; } function getScorerPoints(playerId) { const POS_PTS = { GK: 10, DEF: 6, MID: 4, ATT: 2 }; let pts = 0; for (const m of state.matches) { if (!m.scorer_result) continue; const bet = state.scorerBets.find(b => b.player_id === playerId && b.match_id === m.id); if (!bet) continue; if (bet.pick_player_name === 'AUCUN_BUT') { if (m.scorer_result === 'AUCUN_BUT') pts += 6; } else { const scorers = m.scorer_result.split(',').map(s => s.trim().toLowerCase()); if (scorers.includes(bet.pick_player_name.toLowerCase().trim())) { pts += POS_PTS[bet.pick_position] || 2; } } } return pts; } function getBonusTeams() { const seen = new Map(); state.matches.forEach(m => { if (m.home && m.home !== 'TBD') seen.set(m.home, m.home_flag || ''); if (m.away && m.away !== 'TBD') seen.set(m.away, m.away_flag || ''); }); return [...seen.entries()].sort((a, b) => a[0].localeCompare(b[0], 'fr')); } function getTeamFlag(teamName) { const m = state.matches.find(m => m.home === teamName || m.away === teamName); if (!m) return ''; return m.home === teamName ? (m.home_flag || '') : (m.away_flag || ''); } function filterBonusSearch(category, inputEl) { const dropdown = document.getElementById(`bonus-drop-${category}`); if (!dropdown) return; const query = inputEl.value.trim().toLowerCase(); if (query.length < 3) { dropdown.style.display = 'none'; dropdown.innerHTML = ''; return; } const seen = new Set(); const filtered = []; state.squads.forEach(p => { if (!seen.has(p.player_name) && p.player_name.toLowerCase().includes(query)) { seen.add(p.player_name);