w Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Bon vainqueur + bon écart</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); margin-top: 0.2rem;\">Tu prédis Brésil 2-0 → réel 3-1 (écart = 2) ✓</div> </div> </div> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.85rem 1rem; background: rgba(255,255,255,0.02); border-left: 3px solid var(--border-soft);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--text-dim); min-width: 2rem; text-align: center;\">1</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Bon vainqueur seulement</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); margin-top: 0.2rem;\">Tu prédis Argentine 1-0 → réel 3-1 (écart différent) ✓</div> </div> </div> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.85rem 1rem; border-left: 3px solid transparent;\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--text-muted); min-width: 2rem; text-align: center;\">0</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text-dim);\">Mauvais résultat</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); margin-top: 0.2rem;\">Tu prédis France gagne → réel défaite ✗</div> </div> </div> </div> </div> <!-- BLOC PHASES FINALES (pleine largeur) --> <div style=\"grid-column: 1 / -1; order: 1; background: var(--surface); border: 1px solid rgba(56,189,248,0.3); padding: 1.5rem;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: rgba(56,189,248,0.7); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">⚡ Règles spéciales — Huitièmes, Quarts, Demies, Finale</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: rgba(56,189,248,0.9); margin-bottom: 0.5rem; letter-spacing: 0.04em;\">PHASES FINALES &amp; PÉNALTYS</h3> <p style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 1.25rem; line-height: 1.5;\"> En phase finale, si tu prédis un match nul, tu dois aussi désigner le <strong style=\"color:var(--text)\">vainqueur aux tirs au but</strong>. Un barème spécial s'applique. </p> <div style=\"display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 0.6rem; align-items: stretch;\"> <div style=\"display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem 0.75rem; background: rgba(255,208,96,0.08); border: 1px solid rgba(255,208,96,0.3); text-align: center;\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold-bright); line-height: 1;\">4</span> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text);\">Tout parfait</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.55rem; color: var(--text-muted); line-height: 1.5; text-align: center;\">Score exact<br>+ bon vainqueur aux pens</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: rgba(56,189,248,0.6); margin-top: 0.2rem;\">ex : prédit 1-1 🥅 France → réel 1-1, France gagne</div> </div> <div style=\"display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem 0.75rem; background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.25); text-align: center;\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: rgba(56,189,248,0.9); line-height: 1;\">3</span> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text);\">Nul + bon vainqueur pens</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.55rem; color: var(--text-muted); line-height: 1.5; text-align: center;\">Prédit un nul<br>+ bon pick pénaltys</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: rgba(56,189,248,0.6); margin-top: 0.2rem;\">ex : prédit 0-0 🥅 France → réel 1-1, France gagne</div> </div> <div style=\"display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem 0.75rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-soft); text-align: center;\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--text-dim); line-height: 1;\">2</span> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text);\">Nul prédit, mauvais pens</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.55rem; color: var(--text-muted); line-height: 1.5; text-align: center;\">Tu prédis le nul mais<br>mauvais vainqueur aux pens</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: rgba(56,189,248,0.6); margin-top: 0.2rem;\">ex : prédit 1-1 🥅 Espagne → réel 1-1, France gagne</div> </div> <div style=\"display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem 0.75rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); text-align: center;\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--text-muted); line-height: 1;\">1</span> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text-dim);\">Bon vainqueur final</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.55rem; color: var(--text-muted); line-height: 1.5; text-align: center;\">Bon gagnant, peu importe<br>le scénario (sec ou pens)</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: rgba(56,189,248,0.6); margin-top: 0.2rem;\">ex : prédit France 2-1 → 1-1 pens France · ou prédit