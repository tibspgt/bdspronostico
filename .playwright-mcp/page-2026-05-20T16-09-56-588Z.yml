'; toast.innerHTML = `<span class=\"toast-icon\">${icon}</span><span class=\"toast-msg\">${msg}</span>`; container.appendChild(toast); setTimeout(() => toast.remove(), 3100); } function scrollToApp() { document.getElementById('app').scrollIntoView({ behavior: 'smooth' }); } // ════════════════════════════════════════ // BRACKET SIMULATOR // ════════════════════════════════════════ const GROUPS_SIM = { A: { teams: ['Mexique','Afrique du Sud','Corée du Sud','Tchéquie'], flags: ['mx','za','kr','cz'] }, B: { teams: ['Canada','Bosnie-Herzégovine','Qatar','Suisse'], flags: ['ca','ba','qa','ch'] }, C: { teams: ['Brésil','Écosse','Haïti','Maroc'], flags: ['br','gb-sct','ht','ma'] }, D: { teams: ['États-Unis','Australie','Paraguay','Turquie'], flags: ['us','au','py','tr'] }, E: { teams: ['Allemagne',\"Côte d'Ivoire\",'Curaçao','Équateur'], flags: ['de','ci','cw','ec'] }, F: { teams: ['Japon','Pays-Bas','Suède','Tunisie'], flags: ['jp','nl','se','tn'] }, G: { teams: ['Belgique','Égypte','Iran','Nouvelle-Zélande'], flags: ['be','eg','ir','nz'] }, H: { teams: ['Arabie Saoudite','Cap-Vert','Espagne','Uruguay'], flags: ['sa','cv','es','uy'] }, I: { teams: ['France','Irak','Norvège','Sénégal'], flags: ['fr','iq','no','sn'] }, J: { teams: ['Algérie','Argentine','Autriche','Jordanie'], flags: ['dz','ar','at','jo'] }, K: { teams: ['Colombie','Ouzbékistan','Portugal','RD Congo'], flags: ['co','uz','pt','cd'] }, L: { teams: ['Angleterre','Croatie','Ghana','Panama'], flags: ['gb-eng','hr','gh','pa'] }, }; // R32 seeding officiel WC2026 (source : bracket FIFA) // pos:0 = 1er du groupe | pos:1 = 2e du groupe | type:'wild' = barragiste // // CÔTÉ GAUCHE (→ SF[0]) CÔTÉ DROIT (→ SF[1]) // R32[0] : 2A vs 2B R32[8] : 1D vs Barrag. BEFIJ // R32[1] : 1E vs Barrag. ABCDF R32[9] : 1G vs Barrag. AEHIJ // R32[2] : 1F vs 2C R32[10] : 2K vs 2L // R32[3] : 1C vs 2F R32[11] : 1H vs 2J // R32[4] : 1I vs Barrag. CDFGH R32[12] : 1B vs Barrag. EFGIJ // R32[5] : 2E vs 2I R32[13] : 1J vs 2H // R32[6] : 1A vs Barrag. CEFHI R32[14] : 1K vs Barrag. DEIJL // R32[7] : 1L vs Barrag. EHIJK R32[15] : 2D vs 2G const BSIM_R32 = [ // ── CÔTÉ GAUCHE (R32[0-7] → SF[0]) ── [{type:'rank',group:'A',pos:1},{type:'rank',group:'B',pos:1}], // R32[0] : 2A vs 2B [{type:'rank',group:'E',pos:0},{type:'wild',idx:0}], // R32[1] : 1E vs Barrag.ABCDF [{type:'rank',group:'F',pos:0},{type:'rank',group:'C',pos:1}], // R32[2] : 1F vs 2C [{type:'rank',group:'C',pos:0},{type:'rank',group:'F',pos:1}], // R32[3] : 1C vs 2F [{type:'rank',group:'I',pos:0},{type:'wild',idx:1}], // R32[4] : 1I vs Barrag.CDFGH [{type:'rank',group:'E',pos:1},{type:'rank',group:'I',pos:1}], // R32[5] : 2E vs 2I [{type:'rank',group:'A',pos:0},{type:'wild',idx:2}], // R32[6] : 1A vs Barrag.CEFHI [{type:'rank',group:'L',pos:0},{type:'wild',idx:3}], // R32[7] : 1L vs Barrag.EHIJK // ── CÔTÉ DROIT (R32[8-15] → SF[1]) ── [{type:'rank',group:'D',pos:0},{type:'wild',idx:4}], // R32[8] : 1D vs Barrag.BEFIJ [{type:'rank',group:'G',pos:0},{type:'wild',idx:5}], // R32[9] : 1G vs Barrag.AEHIJ [{type:'rank',group:'K',pos:1},{type:'rank',group:'L',pos:1}], // R32[10] : 2K vs 2L [{type:'rank',group:'H',pos:0},{type:'rank',group:'J',pos:1}], // R32[11] : 1H vs 2J [{type:'rank',group:'B',pos:0},{type:'wild',idx:6}], // R32[12] : 1B vs Barrag.EFGIJ [{type:'rank',group:'J',pos:0},{type:'rank',group:'H',pos:1}], // R32[13] : 1J vs 2H [{type:'rank',group:'K',pos:0},{type:'wild',idx:7}], // R32[14] : 1K vs Barrag.DEIJL [{type:'rank',group:'D',pos:1},{type:'rank',group:'G',pos:1}], // R32[15] : 2D vs 2G ]; const bsim = { groupRanks: {}, thirdPicks: [], picks: {}, locked: false, step: 1 }; let bonusEditing = {}; function bsimEnsureInit() { for (const [g, d] of Object.entries(GROUPS_SIM)) { if (!bsim.groupRanks[g] || bsim.groupRanks[g].length === 0) { bsim.groupRanks[g] = [...d.teams]; } } } function bsimFlag(teamName) { for (const [, d] of Object.entries(GROUPS_SIM)) { const i = d.teams.indexOf(teamName); if (i >= 0) return d.flags[i]; } return getTeamFlagCode(teamName) || ''; } function bsimFlagImg(teamName, h = 13) { const code = bsimFlag(teamName); if (!code) return ''; return `<img src=\"https://flagcdn.com/w20/${code}.png\" style=\"height:${h}px;border-radius:1px;vertical-align:middle;flex-shrink:0;\">`; } function isBracketLocked() { return bsim.locked || new Date() >= BRACKET_DEADLINE; } function bsimGetTeam(roundKey, matchIdx, slotIdx) { if (roundKey === 'r32') { const src = BSIM_R32[matchIdx][slotIdx]; if (src.type === 'rank') return bsim.groupRanks[src.group]?.[src.pos] || null; if (src.type === 'wild') return bsim.thirdPicks[src.idx] || null; return null; } if (roundKey === 'third') return bsimGetLoser('sf', slotIdx); const prevRound = { r16:'r32', qf:'r16', sf:'qf', final:'sf' }[roundKey]; if (!prevRound) return null; return bsim.picks[`${prevRound}_${matchIdx * 2 + slotIdx}`] || null; } function bsimGetLoser(roundKey, matchIdx) { const winner = bsim.picks[`${roundKey}_${matchIdx}`]; if (!winner) return null; const t0 = bsimGetTeam(roundKey, matchIdx, 0); const t1 = bsimGetTeam(roundKey, matchIdx, 1); return winner === t0 ? t1 : t0; } function bsimCascadeFromMatch(roundKey, matchIdx) { const nextRound = { r32:'r16', r16:'qf', qf:'sf', sf:'final' }[roundKey]; if (!nextRound) return; const nextIdx = Math.floor(matchIdx / 2); const nextKey = `${nextRound}_${nextIdx}`; if (bsim.picks[nextKey] !== undefined) { bsimCascadeFromMatch(nextRound, nextIdx); delete bsim.picks[nextKey]; } if (roundKey === 'sf') delete bsim.picks['third_0']; } function bsimPickWinner(roundKey, matchIdx, slotIdx) { if (isBracketLocked()) return; const team = bsimGetTeam(roundKey, matchIdx, slotIdx); if (!team) return; const t0 = bsimGetTeam(roundKey, matchIdx, 0); const t1 = bsimGetTeam(roundKey, matchIdx, 1); if (!t0 || !t1) return; const key = `${roundKey}_${matchIdx}`; const cur = bsim.picks[key]; bsimCascadeFromMatch(roundKey, matchIdx); if (cur === team) { delete bsim.picks[key]; } else { bsim.picks[key] = team; } saveBracketSim(); renderBsimSection(); } function bsimPickThird(slotIdx) { if (isBracketLocked()) return; const t0 = bsimGetLoser('sf', 0); const t1 = bsimGetLoser('sf', 1); if (!t0 || !t1) return; const team = slotIdx === 0 ? t0 : t1; if (bsim.picks['third_0'] === team) delete bsim.picks['third_0']; else bsim.picks['third_0'] = team; saveBracketSim(); renderBsimSection(); } function bsimMoveTeam(grp, fromIdx, dir) { if (isBracketLocked()) return; const toIdx = fromIdx + dir; const ranks = bsim.groupRanks[grp]; if (!ranks || toIdx < 0 || toIdx >= ranks.length) return; [ranks[fromIdx], ranks[toIdx]] = [ranks[toIdx], ranks[fromIdx]]; const validThirds = Object.values(bsim.groupRanks).map(r => r[2]); bsim.thirdPicks = bsim.thirdPicks.filter(t => validThirds.includes(t)); bsim.picks = {}; saveBracketSim(); renderBsimSection(); } // Indices R32 contenant des barragistes (wildcards) — selon le tableau officiel WC2026 const BSIM_WILD_R32 = [1, 4, 6, 7, 8, 9, 12, 14]; function bsimToggle3rd(grp) { if (isBracketLocked()) return; const team = bsim.groupRanks[grp]?.[2]; if (!team) return; const idx = bsim.thirdPicks.indexOf(team); if (idx >= 0) { bsim.thirdPicks.splice(idx, 1); // Les indices wildcards changent tous quand on retire un barragiste → tout effacer for (const i of BSIM_WILD_R32) { bsimCascadeFromMatch('r32', i); delete bsim.picks[`r32_${i}`]; } } else { if (bsim.thirdPicks.length >= 8) { showToast('Tu as déjà sélectionné 8 équipes !', 'error'); return; } bsim.thirdPicks.push(team); } saveBracketSim(); renderBsimSection(); } function bsimNextStep() { if (bsim.step === 2 && bsim.thirdPicks.length !== 8) { showToast('Sélectionne exactement 8 équipes troisièmes !', 'error'); return; } bsim.step = Math.min(bsim.step + 1, 3); saveBracketSim(); renderBsimSection(); } function bsimPrevStep() { bsim.step = Math.max(bsim.step - 1, 1); renderBsimSection(); } async function saveBracketSim() { if (!state.currentUser || bsim.locked || new Date() >= BRACKET_DEADLINE) return; await sb.from('tournament_sims').upsert({ player_id: state.currentUser.id, group_ranks: bsim.groupRanks, third_picks: bsim.thirdPicks, bracket_picks: bsim.picks, locked: false, }, { onConflict: 'player_id' }); } async function lockBracketSim() { if (!state.currentUser) return; if (!bsim.picks['final_0']) { showToast('Complète tous les matchs jusqu\\'à la finale !', 'error'); return; } if (!confirm('Valider ton bracket ? Tu pourras toujours le réinitialiser ensuite si tu changes d\\'avis.')) return; bsim.locked = true; const { error } = await sb.from('tournament_sims').upsert({ player_id: state.currentUser.id, group_ranks: bsim.groupRanks, third_picks: bsim.thirdPicks, bracket_picks: bsim.picks, locked: true, }, { onConflict: 'player_id' }); if (error) { bsim.locked = false; showToast('Erreur lors de la validation', 'error'); return; } showToast('Bracket validé ! 🏆 Bonne chance !', 'success'); renderBsimSection(); } async function resetBracketSim() { if (!state.currentUser) return; if (!confirm('Réinitialiser ton bracket ? Toutes tes sélections seront effacées.')) return; const { error } = await sb.from('tournament_sims').delete().eq('player_id', state.currentUser.id); if (error) { showToast('Erreur lors de la réinitialisation', 'error'); return; } bsim.groupRanks = {}; bsim.thirdPicks = []; bsim.picks = {}; bsim.locked = false; bsim.step = 1; bsimEnsureInit(); showToast('Bracket réinitialisé !', 'default'); renderBsimSection(); } async function loadBracketSim() { if (!state.currentUser) { renderBsimSection(); return; } const { data } = await sb.from('tournament_sims').select('*').eq('player_id', state.currentUser.id).maybeSingle(); if (data) { bsim.groupRanks = data.group_ranks || {}; bsim.thirdPicks = data.third_picks || []; bsim.picks = data.bracket_picks || {}; bsim.locked = data.locked || false; bsim.step = data.locked ? 3 : (bsim.thirdPicks.length === 8 ? 3 : bsim.thirdPicks.length > 0 ? 2 : 1); } else { bsim.groupRanks = {}; bsim.thirdPicks = []; bsim.picks = {}; bsim.locked =