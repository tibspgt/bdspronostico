-size:0.9rem;\">Connecte-toi pour accéder au simulateur de bracket.</div> </div>`; return; } bsimEnsureInit(); const deadlinePassed = new Date() >= BRACKET_DEADLINE; const isLocked = isBracketLocked(); const dotHtml = !isLocked ? `<div class=\"bsim-steps\"> <div class=\"bsim-step-dot ${bsim.step > 1 ? 'done' : 'active'}\"></div> <div class=\"bsim-step-dot ${bsim.step > 2 ? 'done' : bsim.step === 2 ? 'active' : ''}\"></div> <div class=\"bsim-step-dot ${bsim.step === 3 ? 'active' : ''}\"></div> </div>` : ''; let inner = ''; if (isLocked) { const bannerMsg = deadlinePassed ? `🏟 COMPÉTITION LANCÉE — Bracket figé<small>Les pronostics sont fermés depuis le coup d'envoi du tournoi.</small>` : `🔒 BRACKET VALIDÉ<small>Ton pronostic de tournoi est enregistré.</small>`; const resetBtn = bsim.locked && !deadlinePassed ? `<div class=\"bsim-nav\"><button class=\"bsim-btn bsim-btn-back\" onclick=\"resetBracketSim()\">🗑 Réinitialiser</button></div>` : ''; inner = `<div class=\"bsim-locked-banner\">${bannerMsg}</div> ${bsimRenderChampion()} ${bsimRenderHBracket()} ${resetBtn}`; } else if (bsim.step === 1) { const groupsHtml = Object.entries(GROUPS_SIM).map(([grp]) => { const ranks = bsim.groupRanks[grp]; const rankLabels = ['1er','2e','3e','4e']; const rankClasses = ['r1','r2','r3','']; const teamsHtml = ranks.map((team, idx) => ` <div class=\"bsim-team-row\"> <span class=\"bsim-team-rank ${rankClasses[idx]}\">${rankLabels[idx]}</span> ${bsimFlagImg(team)} <span class=\"bsim-team-name\">${team}</span> <button class=\"bsim-move-btn\" onclick=\"bsimMoveTeam('${grp}',${idx},-1)\" ${idx === 0 ? 'disabled' : ''}>▲</button> <button class=\"bsim-move-btn\" onclick=\"bsimMoveTeam('${grp}',${idx},1)\" ${idx === ranks.length - 1 ? 'disabled' : ''}>▼</button> </div>`).join(''); return `<div class=\"bsim-group-card\"><div class=\"bsim-group-label\">GROUPE ${grp}</div>${teamsHtml}</div>`; }).join(''); inner = `<div class=\"bsim-step-label\">ÉTAPE 1 / 3 — Classe les équipes dans chaque groupe (1er = qualifié direct, 2e = qualifié direct, 3e = barrage, 4e = éliminé)</div> <div class=\"bsim-groups-grid\">${groupsHtml}</div> <div class=\"bsim-nav\"><button class=\"bsim-btn bsim-btn-primary\" onclick=\"bsimNextStep()\">SUIVANT →</button></div>`; } else if (bsim.step === 2) { // Adversaires des barragistes dans le tableau officiel WC2026 (dans l'ordre wild[0..7]) const WILD_OPP = [ {group:'E',pos:0},{group:'I',pos:0},{group:'A',pos:0},{group:'L',pos:0}, {group:'D',pos:0},{group:'G',pos:0},{group:'B',pos:0},{group:'K',pos:0}, ]; const thirdTeams = Object.entries(GROUPS_SIM).map(([grp]) => ({ grp, team: bsim.groupRanks[grp]?.[2] })).filter(x => x.team); const count = bsim.thirdPicks.length; const chips = thirdTeams.map(({ grp, team }) => { const pickIdx = bsim.thirdPicks.indexOf(team); const on = pickIdx >= 0; const full = !on && count >= 8; let oppHtml = ''; if (on && pickIdx < WILD_OPP.length) { const opp = WILD_OPP[pickIdx]; const oppTeam = bsim.groupRanks[opp.group]?.[opp.pos]; if (oppTeam) oppHtml = `<span style=\"font-family:'Azeret Mono',monospace;font-size:0.5rem;color:var(--text-muted);\">vs ${oppTeam}</span>`; } return `<div class=\"bsim-wild-chip ${on ? 'bsim-wild-on' : ''} ${full ? 'bsim-wild-full' : ''}\" onclick=\"${full ? '' : `bsimToggle3rd('${grp}')`}\" style=\"flex-direction:column;align-items:flex-start;gap:0.15rem;padding:0.4rem 0.6rem;\"> <div style=\"display:flex;align-items:center;gap:0.35rem;\"> ${on ? `<span style=\"font-family:'Bebas Neue',sans-serif;font-size:0.75rem;color:var(--gold);min-width:14px;\">${pickIdx+1}</span>` : ''} ${bsimFlagImg(team)} <span>${team}</span> <span style=\"font-family:'Azeret Mono',monospace;font-size:0.52rem;color:${on ? 'var(--gold)' : 'var(--text-muted)'};\">Gr.${grp}</span> </div> ${oppHtml} </div>`; }).join(''); inner = `<div class=\"bsim-step-label\">ÉTAPE 2 / 3 — Sélectionne exactement 8 des 12 équipes troisièmes qui se qualifient. L'ordre de sélection détermine leur position dans le tableau.</div> <div class=\"bsim-wild-count\">Sélectionnés : <strong>${count}</strong> / 8</div> <div class=\"bsim-wild-grid\">${chips}</div> <div class=\"bsim-nav\"> <button class=\"bsim-btn bsim-btn-back\" onclick=\"bsimPrevStep()\">← RETOUR</button> <button class=\"bsim-btn bsim-btn-primary\" onclick=\"bsimNextStep()\">SUIVANT →</button> </div>`; } else if (bsim.step === 3) { const allDone = !!bsim.picks['final_0']; inner = `<div class=\"bsim-step-label\">ÉTAPE 3 / 3 — Clique sur une équipe pour la faire avancer dans le tableau. Commence par les 32es !</div> ${bsimRenderHBracket()} ${bsimRenderChampion()} <div class=\"bsim-nav\"> <button class=\"bsim-btn bsim-btn-back\" onclick=\"bsimPrevStep()\">← RETOUR</button> ${allDone && !deadlinePassed ? `<button class=\"bsim-btn bsim-btn-primary\" onclick=\"lockBracketSim()\">🏆 VALIDER MON BRACKET</button>` : ''} </div>`; } el.innerHTML = `<div class=\"bsim-section\"> <div class=\"bsim-title\">🏆 SIMULATEUR DE BRACKET</div> <div class=\"bsim-sub\">// Prédis le parcours du tournoi — juste pour le fun !</div> ${!isLocked ? '<div id=\"bsim-countdown-timer\"></div>' : ''} ${dotHtml} ${inner} </div>`; } // ════════════════════════════════════════ // DÉMARRAGE // ════════════════════════════════════════ init(); </script> </body> </html>"