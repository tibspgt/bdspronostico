ensed', sans-serif; } .bonus-result-label { color: var(--text-muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; } .bonus-result-val { color: var(--gold-bright); font-weight: 700; } /* ── FOND D'ÉCRAN ANIMÉ ── */ @keyframes bg-orb-a { 0% { transform: translate(0,0) scale(1); } 10% { transform: translate(9vw, -5vh) scale(1.07); } 22% { transform: translate(5vw, 16vh) scale(0.94); } 35% { transform: translate(-13vw, 10vh) scale(1.11); } 48% { transform: translate(-7vw, -14vh) scale(0.91); } 60% { transform: translate(15vw, -8vh) scale(1.05); } 72% { transform: translate(3vw, 12vh) scale(0.97); } 85% { transform: translate(-10vw, 4vh) scale(1.08); } 100% { transform: translate(0,0) scale(1); } } @keyframes bg-orb-b { 0% { transform: translate(0,0) scale(1); } 13% { transform: translate(-8vw, 11vh) scale(1.09); } 27% { transform: translate(12vw, 6vh) scale(0.92); } 40% { transform: translate(7vw, -15vh) scale(1.14); } 54% { transform: translate(-14vw, -7vh) scale(0.88); } 67% { transform: translate(-4vw, 13vh) scale(1.06); } 80% { transform: translate(10vw, -4vh) scale(0.95); } 100% { transform: translate(0,0) scale(1); } } @keyframes bg-orb-c { 0% { transform: translate(0,0) scale(1); } 16% { transform: translate(11vw, 9vh) scale(0.93); } 30% { transform: translate(-6vw, -12vh) scale(1.10); } 45% { transform: translate(-12vw, 7vh) scale(0.96); } 58% { transform: translate(8vw, -6vh) scale(1.13); } 74% { transform: translate(4vw, 14vh) scale(0.90); } 88% { transform: translate(-9vw, -3vh) scale(1.04); } 100% { transform: translate(0,0) scale(1); } } .page-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; } .page-bg-orb { position: absolute; border-radius: 50%; transform: translateZ(0); will-change: transform; } .page-bg-orb-1 { width: 70vw; height: 70vw; top: 0%; left: -15%; background: radial-gradient(circle, rgba(232,32,32,0.055) 0%, rgba(232,32,32,0.032) 25%, rgba(232,32,32,0.012) 50%, rgba(232,32,32,0.00