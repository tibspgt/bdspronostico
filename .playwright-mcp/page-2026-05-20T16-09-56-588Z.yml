tyle=\"display:flex;align-items:center;gap:0.5rem;font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;color:var(--text-dim);\"> <span style=\"color:var(--red)\">🔒</span> <em style=\"color:var(--text)\">${betDisplay}</em> <span style=\"color:var(--text-muted);font-size:0.75rem;\">(pari fermé)</span> </div>`; } else { inputHtml = `<div style=\"font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;color:var(--red);\">🔒 Délai expiré — pari non soumis</div>`; } } else if (!state.currentUser) { inputHtml = `<div style=\"color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;\">Connecte-toi pour parier</div>`; } else if (myBet) { if (bonusEditing[cat.key]) { const fieldHtml = isVainqueur ? `<select id=\"bonus-input-${cat.key}\"> <option value=\"\">— Choisir une équipe —</option> ${teams.map(([name]) => `<option value=\"${name}\"${name === myBet ? ' selected' : ''}>${name}</option>`).join('')} </select>` : `<div class=\"bonus-search-wrapper\"><input type=\"text\" id=\"bonus-input-${cat.key}\" value=\"${myBet.replace(/\"/g, '&quot;')}\" oninput=\"filterBonusSearch('${cat.key}',this)\" autocomplete=\"off\"><div class=\"bonus-search-dropdown\" id=\"bonus-drop-${cat.key}\" style=\"display:none;\"></div></div>`; inputHtml = ` <div class=\"bonus-input-row\"> ${fieldHtml} <button class=\"bonus-save-btn\" onclick=\"saveSpecialBet('${cat.key}')\">OK</button> <button class=\"bonus-edit-btn\" onclick=\"cancelEditBet('${cat.key}')\">✕</button> </div>`; } else { inputHtml = `<div style=\"display:flex;align-items:center;gap:0.5rem;font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;flex-wrap:wrap;padding:0.45rem 0;\"> <span style=\"color:var(--text-muted);font-family:'Azeret Mono',monospace;font-size:0.68rem;letter-spacing:0.06em;white-space:nowrap;\">MON PARI :</span> <span style=\"color:var(--green)\">✅</span> <em style=\"color:var(--text)\">${betDisplay}</em> <button class=\"bonus-edit-btn\" onclick=\"editSpecialBet('${cat.key}')\">✏ 