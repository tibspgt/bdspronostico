t Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;\">Exemple — Argentine vs Algérie</div> <div style=\"display: flex; gap: 0.5rem; margin-bottom: 1rem;\"> <div style=\"flex:1; background: rgba(255,208,96,0.06); border: 1px solid rgba(255,208,96,0.15); padding: 0.5rem; text-align: center;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: var(--text-muted);\">1 ARGENTINE</div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold);\">1.35</div> </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); border: 1px solid var(--border-soft); padding: 0.5rem; text-align: center;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: var(--text-muted);\">X NUL</div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text-dim);\">4.20</div> </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); border: 1px solid var(--border-soft); padding: 0.5rem; text-align: center;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.52rem; color: var(--text-muted);\">2 ALGÉRIE</div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text-dim);\">8.00</div> </div> </div> <div style=\"display: flex; flex-direction: column; gap: 0.5rem;\"> <div style=\"display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background: rgba(34,197,94,0.06); border-left: 2px solid rgba(34,197,94,0.4);\"> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; color: var(--text-dim);\"> <strong style=\"color:var(--text)\">Algérie 1-0</strong> (surprise) · score exact prédit </div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: #4ade80; white-space: nowrap; margin-left: 1rem;\">4 × 8.00 = <span style=\"font-size: 1.3rem;\">32 pts</span></div> </div> <div style=\"display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background: rgba(255,208,96,0.04); border-left: 2px solid rgba(255,208,96,0.3);\"> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; color: var(--text-dim);\"> <strong style=\"color:var(--text)\">Argentine 2-0</strong> · bon vainqueur seulement </div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--gold); white-space: nowrap; margin-left: 1rem;\">1 × 1.35 = <span style=\"font-size: 1.3rem;\">1.35 pts</span></div> </div> <div style=\"display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; border-left: 2px solid rgba(255,255,255,0.1);\"> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; color: var(--text-muted);\">Mauvais pronostic → 0 pt quelle que soit la côte</div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--text-muted); white-space: nowrap; margin-left: 1rem;\">0 pt</div> </div> </div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.58rem; color: var(--text-muted); margin-top: 0.75rem; opacity: 0.7;\"> Si aucune côte n'est renseignée, les points de base s'appliquent sans multiplication. </div> </div> </div> <!-- BLOC 3 : MAN OF THE MATCH --> <div style=\"background: var(--surface); border: 1px solid rgba(168,85,247,0.25); padding: 1.5rem; align-self: start;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">03 — Par match</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: rgba(168,85,247,0.9); margin-bottom: 1rem; letter-spacing: 0.04em;\">MAN OF THE MATCH</h3> <div style=\"display: flex; align-items: center; gap: 1.5rem; padding: 1rem; background: rgba(168,85,247,0.07); border-left: 3px solid rgba(168,85,247,0.5);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: rgba(168,85,247,0.9); min-width: 3rem; text-align: center;\">+3</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text);\">Par joueur du match trouvé</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); margin-top: 0.35rem; line-height: 1.5;\">Tu paries sur Mbappé avant le match → il est MOTM → +3 pts<br>Le multiplicateur de côte ne s'applique PAS sur ce bonus</div> </div> </div> </div> <!-- BLOC 4 : BUTEUR --> <div style=\"background: var(--surface); border: 1px solid rgba(34,197,94,0.25); padding: 1.5rem; grid-row: span 2;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">04 — Par match</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: rgba(34,197,94,0.9); margin-bottom: 1rem; letter-spacing: 0.04em;\">⚽ BUTEUR</h3> <p style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 1rem; line-height: 1.5;\"> Parie sur le joueur qui va marquer. Plus le buteur est inattendu, plus les points sont élevés. </p> <div style=\"display: flex; flex-direction: column; gap: 0.5rem;\"> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.75rem 1rem; background: rgba(34,197,94,0.07); border-left: 3px solid rgba(34,197,94,0.5);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(34,197,94,0.9); min-width: 2.5rem; text-align: center;\">+2</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Attaquant marque</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem;\">Le plus probable → le moins récompensé</div> </div> </div> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.75rem 1rem; background: rgba(34,197,94,0.05); border-left: 3px solid rgba(34,197,94,0.35);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(34,197,94,0.75); min-width: 2.5rem; text-align: center;\">+5</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Milieu marque</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem;\">Plus rare, mieux récompensé</div> </div> </div> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.75rem 1rem; background: rgba(34,197,94,0.04); border-left: 3px solid rgba(34,197,94,0.25);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(34,197,94,0.65); min-width: 2.5rem; text-align: center;\">+10</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Défenseur marque</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem;\">But sur corner ou coup franc</div> </div> </div> <div style=\"display: flex; align-items: center; gap: 1.25rem; padding: 0.75rem 1rem; background: rgba(34,197,94,0.03); border-left: 3px solid rgba(34,197,94,0.15);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(34,197,94,0.5); min-width: 2.5rem; text-align: center;\">+30</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text);\">Gardien marque</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem;\">Le jackpot — quasi impossible</div> </div> </div> </div> </div> <!-- BLOC 5 : PARIS BONUS --> <div style=\"background: var(--surface); border: 1px solid rgba(255,208,96,0.2); padding: 1.5rem;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">05 — Avant tournoi</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1rem; letter-spacing: 0.04em;\">PARIS BONUS ⭐</h3> <div style=\"display: flex; align-items: center; gap: 1.5rem; padding: 1rem; background: rgba(255,208,96,0.06); border-left: 3px solid rgba(255,208,96,0.4);\"> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--gold); min-width: 3rem; text-align: center;\">+10</span> <div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text);\">Par bonne réponse</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); margin-top: 0.35rem; line-height: 1.5;\">Vainqueur du tournoi, meilleur buteur…<br>Paris placés avant le début — définitifs, non modifiables</div> </div> </div> </div> <!-- BLOC 5 : OFFRES SPÉCIALES (pleine largeur) --> <div style=\"grid-column: 1 / -1; background: var(--surface); border: 1px solid var(--border-soft); padding: 1.5rem;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">05 — Matchs à bonus</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 0.75rem; letter-spacing: 0.04em;\">OFFRES SPÉCIALES</h3> <p style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5;\"> Certains matchs bénéficient d'un <strong style=\"color:var(--text)\">multiplicateur bonus</strong> appliqué sur tes points (avant la côte). Ils sont signalés par un bandeau coloré en haut de la carte du match. </p> <div style=\"display: flex; flex-direction: column; gap: 0.6rem;\"> <!-- France ×2 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(0,35,149,0.3);\"> <div style=\"background: linear-gradient(90deg, rgba(0,35,149,0.45) 0%, rgba(0,35,149,0.15) 35%, rgba(255,255,255,0.03) 50%, rgba(237,41,57,0.15) 65%, rgba(237,41,57,0.45) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: var(--gold-bright); white-space: nowrap;\"> <img src=\"https://flagcdn.com/w20/fr.png\" style=\"height:11px;border-radius:1px;flex-shrink:0;\"> OFFRE SPÉCIALE FRANCE </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.95rem;\">Tous les matchs où la <strong style=\"color:var(--text)\">France</strong> joue — points doublés</span> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: var(--gold-bright); white-space: nowrap;\">× 2</span> </div> </div> <!-- Mexique ×1.5 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(0,104,71,0.3);\"> <div style=\"background: linear-gradient(90deg, rgba(0,104,71,0.45) 0%, rgba(0,104,71,0.15) 30%, rgba(255,255,255,0.03) 50%, rgba(206,17,38,0.15) 70%, rgba(206,17,38,0.45) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: var(--gold); white-space: nowrap;\"> <img src=\"https://flagcdn.com/w20/mx.png\" style=\"height:11px;border-radius:1px;flex-shrink:0;\"> MATCH D'OUVERTURE MEXIQUE </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.95rem;\"><strong style=\"color:var(--text)\">Mexique</strong> vs Afrique du Sud — premier match du tournoi</span> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: var(--gold); white-space: nowrap;\">× 1.5</span> </div> </div> <!-- Canada ×1.5 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(216,6,33,0.3);\"> <div style=\"background: linear-gradient(90deg, rgba(216,6,33,0.55) 0%, rgba(216,6,33,0.22) 30%, rgba(255,255,255,0.06) 50%, rgba(216,6,33,0.22) 70%, rgba(216,6,33,0.55) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: #FF6677; white-space: nowrap;\"> <img src=\"https://flagcdn.com/w20/ca.png\" style=\"height:11px;border-radius:1px;flex-shrink:0;\"> MATCH D'OUVERTURE CANADA </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.95rem;\"><strong style=\"color:var(--text)\">Canada</strong> vs Bosnie-Herzégovine — premier match du pays hôte</span> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #FF6677; white-space: nowrap;\">× 1.5</span> </div> </div> <!-- États-Unis ×1.5 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(60,59,110,0.35);\"> <div style=\"background: linear-gradient(90deg, rgba(60,59,110,0.55) 0%, rgba(60,59,110,0.22) 30%, rgba(255,255,255,0.05) 50%, rgba(178,34,52,0.22) 70%, rgba(178,34,52,0.55) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: #8899FF; white-space: nowrap;\"> <img src=\"https://flagcdn.com/w20/us.png\" style=\"height:11px;border-radius:1px;flex-shrink:0;\"> MATCH D'OUVERTURE ÉTATS-UNIS </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.95rem;\"><strong style=\"color:var(--text)\">États-Unis</strong> vs Paraguay — premier match du pays hôte</span> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #8899FF; white-space: nowrap;\">× 1.5</span> </div> </div> <!-- Big Matchs ×1.5 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(255,140,0,0.3);\"> <div style=\"background: linear-gradient(90deg, rgba(160,0,0,0.58) 0%, rgba(255,69,0,0.42) 30%, rgba(255,140,0,0.28) 50%, rgba(255,69,0,0.42) 70%, rgba(160,0,0,0.58) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: #FF8C00; white-space: nowrap;\"> 💥 BIG MATCH </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <div style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.88rem; line-height: 1.5;\">Affiches très attendues entre grandes nations du football mondial. Points multipliés par <strong style=\"color:var(--text)\">1.5</strong>.</div> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #FF8C00; white-space: nowrap;\">× 1.5</span> </div> </div> <!-- Matchs Funky ×1.25 --> <div style=\"display: flex; align-items: stretch; overflow: hidden; border: 1px solid rgba(255,105,180,0.3);\"> <div style=\"background: linear-gradient(135deg, rgba(255,20,147,0.38) 0%, rgba(255,105,180,0.18) 30%, rgba(0,191,255,0.12) 60%, rgba(135,206,250,0.28) 100%); padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 260px; flex-shrink: 0; font-family: 'Azeret Mono', monospace; font-size: 0.55rem; letter-spacing: 0.10em; color: #FF69B4; white-space: nowrap;\"> 🌈 MATCH FUNKY </div> <div style=\"flex:1; background: rgba(255,255,255,0.02); padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;\"> <div style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.88rem; line-height: 1.5;\">Matchs surprenants, insolites ou aux confrontations inattendues — choisies pour leur potentiel de choc. Points multipliés par <strong style=\"color:var(--text)\">1.25</strong>.</div> <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #FF69B4; white-space: nowrap;\">× 1.25</span> </div> </div> </div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.57rem; color: var(--text-muted); margin-top: 1rem; opacity: 0.7;\"> Le multiplicateur s'applique sur les points de base, avant la côte · Les offres spéciales ne se cumulent pas entre elles </div> </div> <!-- BLOC 6 : RÈGLES GÉNÉRALES (pleine largeur) --> <div style=\"grid-column: 1 / -1; background: var(--surface); border: 1px solid var(--border-soft); padding: 1.5rem;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">06 — À savoir</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1.25rem; letter-spacing: 0.04em;\">RÈGLES GÉNÉRALES</h3> <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;\"> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--gold); flex-shrink: 0;\">→</span> Les pronostics doivent être soumis avant le coup d'envoi</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--gold); flex-shrink: 0;\">→</span> Impossible de modifier un pronostic une fois le match commencé</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--gold); flex-shrink: 0;\">→</span> Le classement est mis à jour après chaque match terminé</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--gold); flex-shrink: 0;\">→</span> En cas d'égalité, le nombre de scores exacts détermine le classement</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem; grid-column: 1 / -1;\"><span style=\"color: var(--gold); flex-shrink: 0;\">→</span> Le multiplicateur de côte ne s'applique qu'aux points positifs — 0 pt reste 0 pt</div> </div> </div> <!-- BLOC 6 : LA CAGNOTTE (pleine largeur) --> <div style=\"grid-column: 1 / -1; background: var(--surface); border: 1px solid rgba(45,179,74,0.3); padding: 1.5rem;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;\">06 — Optionnel</div> <h3 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--green-bright); margin-bottom: 0.6rem; letter-spacing: 0.04em;\">LA CAGNOTTE</h3> <p style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem; margin-bottom: 1.5rem; line-height: 1.5;\"> Envie de pimenter le tournoi ? C'est simple : tu mises <strong style=\"color: var(--green-bright)\">10€ fixe</strong> avant le début, ou tu passes. Seuls les 3 premiers au classement final gagnent de l'argent. Les autres perdent leur mise. </p> <!-- Podium avec les gains --> <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;\"> <div style=\"background: rgba(232,160,32,0.08); border: 2px solid rgba(232,160,32,0.4); padding: 1.25rem; text-align: center; position: relative;\"> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold); line-height: 1;\">1er</div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin: 0.5rem 0;\">Mise + 70% de la cagnotte</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); line-height: 1.5;\">ex. 10 parieurs → cagnotte 70€<br>→ récupère <strong style=\"color: var(--gold)\">10 + 49 = 59€</strong></div> </div> <div style=\"background: rgba(192,192,192,0.06); border: 2px solid rgba(192,192,192,0.25); padding: 1.25rem; text-align: center;\"> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #C0C0C0; line-height: 1;\">2ème</div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin: 0.5rem 0;\">Mise + 30% de la cagnotte</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); line-height: 1.5;\">ex. 10 parieurs → cagnotte 70€<br>→ récupère <strong style=\"color: #C0C0C0\">10 + 21 = 31€</strong></div> </div> <div style=\"background: rgba(184,115,51,0.06); border: 2px solid rgba(184,115,51,0.25); padding: 1.25rem; text-align: center;\"> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #CD7F32; line-height: 1;\">3ème</div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin: 0.5rem 0;\">Mise remboursée (10€)</div> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); line-height: 1.5;\">ni gagné, ni perdu<br>→ récupère <strong style=\"color: #CD7F32\">10€</strong></div> </div> </div> <!-- Explication de la cagnotte --> <div style=\"background: rgba(0,0,0,0.25); border: 1px solid rgba(45,179,74,0.25); padding: 1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0;\">Cagnotte =</div> <div style=\"display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;\"> <div style=\"background: rgba(45,179,74,0.1); border: 1px solid rgba(45,179,74,0.3); padding: 0.4rem 0.8rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--green-bright);\">NB PARIEURS × 10€</div> <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--text-muted);\">−</div> <div style=\"background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); padding: 0.4rem 0.8rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--text-dim);\">30€ (mises podium remboursées)</div> </div> <div style=\"font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 0.9rem; flex: 1; min-width: 200px;\">Les 10€ du podium sont remboursés, le reste part dans la cagnotte.</div> </div> <!-- À retenir --> <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem;\"> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--green-bright); flex-shrink: 0;\">→</span> Mise de 10€ fixe, déclarée avant le 1er match — définitive</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--green-bright); flex-shrink: 0;\">→</span> Tu peux ne pas participer et jouer quand même au classement</div> <div style=\"display: flex; gap: 0.75rem; align-items: flex-start; font-family: 'Barlow Condensed', sans-serif; color: var(--text-dim); font-size: 1rem;\"><span style=\"color: var(--green-bright); flex-shrink: 0;\">→</span> Suis les gains en direct dans l'onglet Cagnotte</div> </div> </div> </div> </div> <!-- CAGNOTTE PANEL --> <div class=\"panel\" id=\"panel-cagnotte\"> <div class=\"section-header\"> <p class=\"section-tag\">// Paris collectif</p> <h2 class=\"section-title\">La Cagnotte</h2> </div> <div id=\"cagnotte-cards\"></div> <div id=\"cagnotte-graph\"></div> <div class=\"section-header\" style=\"margin-top:1.5rem;\"> <p class=\"section-tag\">// Classement des parieurs</p> <h2 class=\"section-title\">Podium cagnotte</h2> </div> <div id=\"cagnotte-ranking\"></div> </div> <!-- BONUS PANEL --> <div class=\"panel\" id=\"panel-bonus\"> <div class=\"section-header\"> <p class=\"section-tag\">// Paris de fin de tournoi</p> <h2 class=\"section-title\">Paris Bonus ⭐</h2> </div> <div class=\"bonus-info-bar\"> Parie sur les récompenses individuelles du tournoi. Chaque bonne réponse vaut <strong style=\"color:var(--gold)\">+10 points</strong> ajoutés à ton score final. Les paris sont <strong>définitifs et non modifiables</strong>. Les résultats sont révélés à la clôture de la compétition. </div> <div id=\"bonus-countdown\" style=\"margin-bottom:1rem;font-family:'Azeret Mono',monospace;font-size:0.8rem;letter-spacing:0.06em;\"></div> <div class=\"bonus-grid\" id=\"bonus-grid\"> <div class=\"empty-state\"><div class=\"empty-title\">Chargement...</div></div> </div> <div id=\"bsim-section\"></div> </div> <!-- ADMIN PANEL --> <div class=\"panel\" id=\"panel-admin\"> <div class=\"section-header\"> <p class=\"section-tag\">// Panneau d'administration</p> <h2 class=\"section-title\">Valider les résultats</h2> </div> <div id=\"admin-matches-list\"> <div class=\"empty-state\"><div class=\"empty-title\">Chargement...</div></div> </div> </div> </div> <!-- RIGHT: SIDEBAR --> <div class=\"sidebar\"> <div class=\"leaderboard\" id=\"leaderboard-widget\"> <div class=\"lb-header\"> <div class=\"lb-title\">CLASSEMENT</div> <div class=\"lb-subtitle\">// Classement général</div> </div> <div id=\"lb-rows\"></div> </div> <div class=\"leaderboard\" id=\"sidebar-results-widget\" style=\"display:none;\"> <div class=\"lb-header\"> <div class=\"lb-title\">RÉSULTATS</div> <div class=\"lb-subtitle\">// Matchs terminés</div> </div> <div id=\"sidebar-results-rows\"></div> </div> <div class=\"points-card\"> <div class=\"points-header\">BARÈME DES POINTS</div> <div class=\"points-rule\"> <span class=\"pts-badge pts4\">4</span> <span class=\"pts-desc\">Score exact prédit</span> </div> <div class=\"points-rule\"> <span class=\"pts-badge pts2\">2</span> <span class=\"pts-desc\">Bon vainqueur & bon écart</span> </div> <div class=\"points-rule\"> <span class=\"pts-badge pts1\">1</span> <span class=\"pts-desc\">Bon vainqueur seulement</span> </div> <div class=\"points-rule\"> <span class=\"pts-badge pts0\">0</span> <span class=\"pts-desc\">Mauvais pronostic</span> </div> <div style=\"margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-soft);\"> <div style=\"font-family: 'Azeret Mono', monospace; font-size: 0.58rem; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.06em; text-transform: uppercase;\">Multiplicateur de côte</div> <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; color: var(--text-dim); line-height: 1.4;\"> Points × côte du résultat réel<br> <span style=\"font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--gold);\">Ex: 4 pts × côte 8.00 = 32 pts</span> </div> </div> <div style=\"margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; color: var(--text-dim);\">MOTM trouvé</span> <span style=\"font-family: 'Bebas Neue', sans-serif; color: rgba(168,85,247,0.9);\">+2 pts</span> </div> <div style=\"margin-top: 0.4rem; display:flex; justify-content:space-between; align-items:center;\"> <span style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; color: var(--text-dim);\">Bonus tournoi</span> <span style=\"font-family: 'Bebas Neue', sans-serif; color: var(--gold);\">+10 pts</span> </div> </div> </div> </main> <!-- ──────────────── MODALS ──────────────── --> <div class=\"modal-overlay\" id=\"modal-login\"> <div class=\"modal\"> <div class=\"modal-title\">REJOINDRE</div> <div class=\"modal-subtitle\">Entre dans la ligue avec tes amis</div> <div class=\"auth-tabs\"> <button class=\"auth-tab active\" onclick=\"switchAuthTab('signup')\">Première fois</button> <button class=\"auth-tab\" onclick=\"switchAuthTab('signin')\">Je reviens</button> </div> <!-- Inscription --> <div class=\"auth-panel active\" id=\"auth-panel-signup\"> <div class=\"form-group\"> <label class=\"form-label\">Code de la ligue</label> <input class=\"form-input\" type=\"text\" id=\"signup-code\" placeholder=\"Demande-le à l'organisateur\" autocomplete=\"off\" /> </div> <div class=\"form-group\"> <label class=\"form-label\">Ton prénom</label> <input class=\"form-input\" type=\"text\" id=\"signup-name\" placeholder=\"ex: Thomas\" /> </div> <div class=\"form-group\"> <label class=\"form-label\">Ton équipe du coeur</label> <div class=\"flag-picker-grid\" id=\"flag-picker-grid\"></div> <div class=\"flag-selected-preview\" id=\"flag-selected-preview\">Clique sur un drapeau</div> </div> <div class=\"form-group\"> <label class=\"form-label\">Ton PIN (4 chiffres)</label> <input class=\"form-input\" type=\"password\" id=\"signup-pin\" placeholder=\"••••\" maxlength=\"4\" inputmode=\"numeric\" pattern=\"[0-9]*\" /> </div> </div> <!-- Reconnexion --> <div class=\"auth-panel\" id=\"auth-panel-signin\"> <div class=\"form-group\"> <label class=\"form-label\">Ton prénom</label> <input class=\"form-input\" type=\"text\" id=\"signin-name\" placeholder=\"ex: Thomas\" /> </div> <div class=\"form-group\"> <label class=\"form-label\">Ton PIN</label> <input class=\"form-input\" type=\"password\" id=\"signin-pin\" placeholder=\"••••\" maxlength=\"4\" inputmode=\"numeric\" pattern=\"[0-9]*\" /> </div> </div> <div class=\"form-actions\"> <button class=\"btn-primary\" id=\"auth-submit-btn\" onclick=\"signUp()\">C'est parti !</button> <button class=\"btn-secondary\" onclick=\"closeModal('login')\">Annuler</button> </div> </div> </div> <!-- ──────────────── MODAL PROFIL ──────────────── --> <div class=\"modal-overlay\" id=\"modal-profile\"> <div class=\"modal\"> <div class=\"modal-title\">MON PROFIL</div> <div class=\"modal-subtitle\" id=\"profile-modal-name\">Modifier mes informations</div> <div class=\"form-group\" style=\"text-align:center;\"> <label class=\"form-label\" style=\"text-align:left;display:block;margin-bottom:0.75rem;\">Ma photo de profil</label> <div class=\"avatar-step-circle\" id=\"profile-avatar-circle\" onclick=\"document.getElementById('profile-avatar-input').click()\" style=\"width:84px;height:84px;margin:0 auto 0.5rem;\"> <div class=\"avatar-step-placeholder\" id=\"profile-avatar-placeholder\"> <div style=\"font-size:1.4rem;\">📷</div> </div> </div> <div style=\"font-family:'Azeret Mono',monospace;font-size:0.55rem;color:var(--text-muted);letter-spacing:0.05em;cursor:pointer;\" onclick=\"document.getElementById('profile-avatar-input').click()\">CHANGER LA PHOTO</div> <input type=\"file\" id=\"profile-avatar-input\" accept=\"image/*\" style=\"display:none\" onchange=\"previewProfileAvatar(event)\" /> </div> <div class=\"form-group\"> <label class=\"form-label\">Mon équipe du coeur</label> <div class=\"flag-picker-grid\" id=\"profile-flag-grid\"></div> <div class=\"flag-selected-preview\" id=\"profile-flag-preview\">Chargement...</div> </div> <div class=\"form-group\"> <label class=\"form-label\">Nouveau PIN — laisser vide pour ne pas changer</label> <input class=\"form-input\" type=\"password\" id=\"profile-new-pin\" placeholder=\"••••\" maxlength=\"4\" inputmode=\"numeric\" pattern=\"[0-9]*\" /> </div> <div class=\"form-actions\"> <button class=\"btn-primary\" id=\"profile-save-btn\" onclick=\"saveProfile()\">Enregistrer</button> <button class=\"btn-secondary\" onclick=\"closeModal('profile')\">Annuler</button> </div> </div> </div> <!-- ──────────────── MODAL AVATAR ONBOARDING ──────────────── --> <div class=\"modal-overlay\" id=\"modal-avatar\"> <div class=\"modal\"> <div style=\"font-family:'Azeret Mono',monospace;font-size:0.58rem;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.5rem;\">Étape 2 / 2</div> <div class=\"modal-title\">TA PHOTO</div> <div class=\"modal-subtitle\">Mets un visage sur ton prénom !</div> <div class=\"avatar-step-circle\" id=\"avatar-step-circle\" onclick=\"document.getElementById('avatar-file-input').click()\"> <div class=\"avatar-step-placeholder\" id=\"avatar-step-placeholder\"> <div style=\"font-size:1.8rem;margin-bottom:0.4rem;\">📷</div> <div style=\"font-family:'Azeret Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;\">CLIQUE POUR CHOISIR</div> </div> </div> <input type=\"file\" id=\"avatar-file-input\" accept=\"image/*\" style=\"display:none\" onchange=\"previewAvatar(event)\" /> <p style=\"font-family:'Barlow Condensed',sans-serif;color:var(--text-dim);font-size:0.9rem;text-align:center;margin-bottom:1.5rem;line-height:1.5;\"> Ta photo s'affichera dans le classement et sur les matchs.<br> <span style=\"font-family:'Azeret Mono',monospace;font-size:0.62rem;color:var(--text-muted);\">Ton drapeau restera affiché à côté de ton prénom.</span> </p> <div class=\"form-actions\"> <button class=\"btn-primary\" id=\"avatar-save-btn\" onclick=\"uploadAndSaveAvatar()\" disabled>Enregistrer</button> <button class=\"btn-secondary\" onclick=\"skipAvatarStep()\">Passer pour l'instant</button> </div> </div> </div> <!-- ──────────────── TOASTS ──────────────── --> <div class=\"toast-container\" id=\"toasts\"></div> <script src=\"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2\"></script> <script> // ════════════════════════════════════════ // SUPABASE CLIENT // ════════════════════════════════════════ const LEAGUE_CODE = 'CDM2026'; const WC2026_TEAMS = [ // Hôtes { code:'us', name:'États-Unis' }, { code:'ca', name:'Canada' }, { code:'mx', name:'Mexique' }, // CONMEBOL { code:'ar', name:'Argentine' }, { code:'br', name:'Brésil' }, { code:'co', name:'Colombie' }, { code:'uy', name:'Uruguay' }, { code:'ec', name:'Équateur' }, { code:'ve', name:'Venezuela' }, { code:'py', name:'Paraguay' }, { code:'pe', name:'Pérou' }, { code:'cl', name:'Chili' }, // UEFA { code:'es', name:'Espagne' }, { code:'fr', name:'France' }, { code:'de', name:'Allemagne' }, { code:'gb-eng', name:'Angleterre' }, { code:'pt', name:'Portugal' }, { code:'nl', name:'Pays-Bas' }, { code:'it', name:'Italie' }, { code:'be', name:'Belgique' }, { code:'hr', name:'Croatie' }, { code:'ch', name:'Suisse' }, { code:'dk', name:'Danemark' }, { code:'at', name:'Autriche' }, { code:'gb-sct', name:'Écosse' }, { code:'tr', name:'Turquie' }, { code:'hu', name:'Hongrie' }, { code:'rs', name:'Serbie' }, { code:'no', name:'Norvège' }, { code:'cz', name:'Tchéquie' }, { code:'pl', name:'Pologne' }, { code:'ro', name:'Roumanie' }, { code:'sk', name:'Slovaquie' }, { code:'ua', name:'Ukraine' }, { code:'ba', name:'Bosnie-Herzégovine' }, { code:'se', name:'Suède' }, // CONCACAF { code:'cr', name:'Costa Rica' }, { code:'jm', name:'Jamaïque' }, { code:'hn', name:'Honduras' }, { code:'pa', name:'Panama' }, { code:'sv', name:'El Salvador' }, { code:'cw', name:'Curaçao' }, { code:'ht', name:'Haïti' }, // AFC { code:'jp', name:'Japon' }, { code:'kr', name:'Corée du Sud' }, { code:'au', name:'Australie' }, { code:'ir', name:'Iran' }, { code:'sa', name:'Arabie Saoudite' }, { code:'qa', name:'Qatar' }, { code:'jo', name:'Jordanie' }, { code:'iq', name:'Irak' }, { code:'uz', name:'Ouzbékistan' }, { code:'cn', name:'Chine' }, // CAF { code:'ma', name:'Maroc' }, { code:'sn', name:'Sénégal' }, { code:'ng', name:'Nigéria' }, { code:'eg', name:'Égypte' }, { code:'cm', name:'Cameroun' }, { code:'gh', name:'Ghana' }, { code:'ci', name:\"Côte d'Ivoire\" }, { code:'tn', name:'Tunisie' }, { code:'za', name:'Afrique du Sud' }, { code:'dz', name:'Algérie' }, { code:'ml', name:'Mali' }, { code:'cd', name:'RD Congo' }, // OFC { code:'nz', name:'Nouvelle-Zélande' }, ]; let selectedFlagCode = ''; function renderAvatar(code, avatarUrl) { if (avatarUrl) return `<img src=\"${avatarUrl}\" alt=\"\" />`; if (code && /^[a-z]{2}(-[a-z]+)?$/.test(code)) { return `<img src=\"https://flagcdn.com/w40/${code}.png\" alt=\"\" />`; } return code || '⚽'; } function updateNavUser(player) { document.getElementById('userAvatar').innerHTML = renderAvatar(player.emoji, player.avatar_url); const flagBadge = document.getElementById('userFlagBadge'); if (player.avatar_url && player.emoji) { flagBadge.src = `https://flagcdn.com/w20/${player.emoji}.png`; flagBadge.style.display = 'inline'; } else { flagBadge.style.display = 'none'; } document.getElementById('userName').childNodes[1].textContent = player.name; } function renderFlagPicker(gridId = 'flag-picker-grid', callbackName = 'selectFlag') { const grid = document.getElementById(gridId); if (!grid) return; grid.innerHTML = WC2026_TEAMS.map(t => `<button class=\"flag-option\" data-code=\"${t.code}\" title=\"${t.name}\" onclick=\"${callbackName}('${t.code}','${t.name.replace(/'/g,'&#39;')}')\"> <img src=\"https://flagcdn.com/w40/${t.code}.png\" alt=\"${t.name}\" loading=\"lazy\" /> </button>` ).join(''); } function selectFlag(code, name) { selectedFlagCode = code; document.querySelectorAll('#flag-picker-grid .flag-option').forEach(b => b.classList.toggle('selected', b.dataset.code === code) ); const preview = document.getElementById('flag-selected-preview'); if (preview) preview.innerHTML = `<img src=\"https://flagcdn.com/w40/${code}.png\" /> ${name}`; } let selectedProfileFlagCode = ''; function selectProfileFlag(code, name) { selectedProfileFlagCode = code; document.querySelectorAll('#profile-flag-grid .flag-option').forEach(b => b.classList.toggle('selected', b.dataset.code === code) ); const preview = document.getElementById('profile-flag-preview'); if (preview) preview.innerHTML = `<img src=\"https://flagcdn.com/w40/${code}.png\" /> ${name}`; } const VAPID_PUBLIC_KEY = 'BGxPMjfNYFTY5CpdS4_YacvtX8mSJrolUBOERnwEEXNvgIzZIieAgyzMBzWT0HzXMRUQX_6mOTH_qSh6nfByvGg'; function urlBase64ToUint8Array(b64) { const pad = '='.repeat((4 - b64.length % 4) % 4); const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/')); return Uint8Array.from([...raw].map(c => c.charCodeAt(0))); } async function initPush() { if (!('serviceWorker' in navigator) || !('PushManager' in window)) return; try { await navigator.serviceWorker.register('./sw.js'); } catch(e) {} updatePushButton(); } async function updatePushButton() { const btn = document.getElementById('btn-push-notif'); if (!btn || !('Notification' in window)) return; const reg = await navigator.serviceWorker.ready.catch(() => null); if (!reg) return; const sub = await reg.pushManager.getSubscription(); if (Notification.permission === 'granted' && sub) { btn.textContent = '🔔 Notifications activées'; btn.disabled = true; btn.style.opacity = '0.5'; } else if (Notification.permission === 'denied') { btn.textContent = '🔕 Notifications bloquées'; btn.disabled = true; btn.style.opacity = '0.5'; } else { btn.textContent = '🔔 Activer les notifications'; btn.disabled = false; btn.style.opacity = ''; } }