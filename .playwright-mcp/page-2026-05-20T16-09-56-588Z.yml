"panels\"> <!-- MATCHES PANEL --> <div class=\"panel active\" id=\"panel-matches\"> <div class=\"section-header\"> <p class=\"section-tag\">// CDM 2026 — 104 matchs</p> <h2 class=\"section-title\">Matchs & Pronostics</h2> </div> <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid var(--border-soft);margin-bottom:1.5rem;padding-bottom:0.6rem;\"> <div class=\"section-tabs\" style=\"border:none;margin:0;padding:0;\"> <button class=\"stab active\" onclick=\"filterRound('all', this)\">Tous</button> <button class=\"stab\" onclick=\"filterRound(1, this)\">J1 (11-18 juin)</button> <button class=\"stab\" onclick=\"filterRound(2, this)\">J2 (18-24 juin)</button> <button class=\"stab\" onclick=\"filterRound(3, this)\">J3 (24-28 juin)</button> <button class=\"stab\" onclick=\"filterRound('finals', this)\">Phases Finales</button> </div> <div style=\"display:flex;align-items:center;gap:0.4rem;flex-shrink:0;\"> <span style=\"font-family:'Azeret Mono',monospace;font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;\">Tri</span> <button class=\"stab active\" id=\"sort-btn-group\" onclick=\"setMatchSort('group', this)\">Par groupe</button> <button class=\"stab\" id=\"sort-btn-date\" onclick=\"setMatchSort('date', this)\">Par date</button> </div> </div> <div id=\"matches-container\"></div> </div> <!-- GROUPES PANEL --> <div class=\"panel\" id=\"panel-groupes\"> <div class=\"section-header\"> <p class=\"section-tag\">// Phase de groupes — CDM 2026</p> <h2 class=\"section-title\">Classements des groupes</h2> </div> <div id=\"groupes-container\"></div> </div> <!-- ARCHIVES PANEL --> <div class=\"panel\" id=\"panel-archives\"> <div class=\"section-header\"> <p class=\"section-tag\">// Matchs terminés</p> <h2 class=\"section-title\">Résultats</h2> </div> <div id=\"archives-container\"></div> </div> <!-- CLASSEMENT PANEL --> <div class=\"panel\" id=\"panel-classement\"> <div class=\"sec