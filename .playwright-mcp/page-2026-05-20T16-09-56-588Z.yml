ent { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; flex: 1; } .admin-select { background: var(--bg3); border: 1px solid var(--border-soft); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; padding: 0.35rem 0.75rem; outline: none; cursor: pointer; max-width: 260px; } .admin-select:focus { border-color: var(--gold); } .admin-text-input { background: var(--bg3); border: 1px solid var(--border-soft); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; padding: 0.35rem 0.75rem; outline: none; width: 220px; } .admin-text-input:focus { border-color: var(--gold); } .admin-btn { font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; padding: 0.38rem 1rem; background: var(--gold); color: var(--bg); border: none; cursor: pointer; white-space: nowrap; clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px)); transition: background 0.15s; } .admin-btn:hover { background: var(--gold-bright); } .admin-btn--edit { background: transparent; color: var(--text-muted); border: 1px solid var(--border-soft); clip-path: none; font-size: 0.72rem; } .admin-btn--edit:hover { color: var(--text); border-color: var(--text-muted); background: transparent; } .admin-validated { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 600; color: var(--gold); } .admin-scorer-tag { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--bg3); border: 1px solid var(--gold-dim); color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 600; padding: 0.15rem 0.5rem 0.15rem 0.65rem; } .admin-scorer-tag button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; } .admin-scorer-tag button:hover { color: var(--red); } .admin-section-lbl { font-family: 'Azeret Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-soft); } .admin-all-done { text-align: center; padding: 3rem 1rem; color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; } .admin-all-done-sub { font-family: 'Azeret Mono', monospace; font-size: 0.65rem; color: var(--text-muted); margin-top: 0.5rem; letter-spacing: 0.1em; } /* ════════════════════════════════════════ BRACKET SIMULATOR ════════════════════════════════════════ */ .bsim-section { margin-top: 2.5rem; border-top: 1px solid var(--border-soft); padding-top: 2rem; } .bsim-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; color: var(--text); } .bsim-sub { font-family: 'Azeret Mono', monospace; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.08em; margin-top: 0.2rem; margin-bottom: 1.25rem; } .bsim-steps { display: flex; gap: 0.4rem; align-items: center; margin-bottom: 1rem; } .bsim-step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); transition: background 0.2s; } .bsim-step-dot.active { background: var(--gold); } .bsim-step-dot.done { background: var(--green); } .bsim-step-label { font-family: 'Azeret Mono', monospace; font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 1rem; } .bsim-groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; margin-bottom: 1rem; } .bsim-group-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 8px; padding: 0.65rem 0.75rem; } .bsim-group-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem; color: var(--gold); letter-spacing: 0.12em; margin-bottom: 0.35rem; } .bsim-team-row { display: flex; align-items: center; gap: 0.35rem; padding: 0.25rem 0.3rem; border-radius: 4px; margin: 0.1rem 0; background: var(--bg2); font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; } .bsim-team-rank { font-family: 'Azeret Mono', monospace; font-size: 0.55rem; color: var(--text-muted); width: 16px; text-align: center; flex-shrink: 0; } .bsim-team-rank.r1 { color: var(--gold); } .bsim-team-rank.r2 { color: var(--cyan); } .bsim-team-rank.r3 { color: var(--text-dim); } .bsim-team-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .bsim-move-btn { background: none; border: 1px solid var(--border-soft); color: var(--text-dim); width: 18px; height: 18px; border-radius: 3px; font-size: 0.55rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; line-height: 1; } .bsim-move-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); } .bsim-move-btn:disabled { opacity: 0.2; cursor: default; } .bsim-wild-count { font-family: 'Azeret Mono', monospace; font-size: 0.68rem; color: var(--text-dim); margin-bottom: 0.75rem; } .bsim-wild-count strong { color: var(--gold); } .bsim-wild-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; } .bsim-wild-chip { display: flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.6rem; border-radius: 6px; border: 1px solid var(--border-soft); background: var(--surface); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; transition: all 0.12s; user-select: none; } .bsim-wild-chip:hover:not(.bsim-wild-full):not(.bsim-wild-locked) { border-color: var(--text-muted); } .bsim-wild-chip.bsim-wild-on { border-color: var(--gold); background: rgba(232,160,32,0.12); color: var(--gold); } .bsim-wild-chip.bsim-wild-full { opacity: 0.4; cursor: default; } .bsim-wild-chip.bsim-wild-locked { cursor: default; } .bsim-round-block { margin-bottom: 1.5rem; } .bsim-round-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 0.5rem; } .bsim-matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.45rem; } .bsim-match-card { border: 1px solid var(--border-soft); border-radius: 6px; overflow: hidden; background: var(--surface); } .bsim-match-slot { display: flex; align-items: center; gap: 0.35rem; padding: 0.32rem 0.5rem; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; border-bottom: 1px solid var(--border-soft); min-height: 30px; cursor: pointer; transition: background 0.1s; } .bsim-match-slot:last-child { border-bottom: none; } .bsim-match-slot:hover:not(.bsim-slot-empty):not(.bsim-slot-locked) { background: var(--surface2); } .bsim-match-slot.bsim-slot-winner { background: rgba(232,160,32,0.15); color: var(--gold); font-weight: 600; } .bsim-match-slot.bsim-slot-empty { color: var(--text-muted); font-size: 0.65rem; font-style: italic; cursor: default; } .bsim-match-slot.bsim-slot-locked { cursor: default; } .bsim-champion-box { text-align: center; padding: 1.5rem; border: 1px solid var(--gold); border-radius: 10px; background: rgba(232,160,32,0.06); margin-bottom: 1.25rem; } .bsim-champion-label { font-family: 'Azeret Mono', monospace; font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.12em; margin-bottom: 0.6rem; } .bsim-champion-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 0.05em; } .bsim-nav { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; } .bsim-btn { padding: 0.55rem 1.4rem; border-radius: 6px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; } .bsim-btn-primary { background: var(--gold); color: #000; } .bsim-btn-primary:hover { background: var(--gold-bright); } .bsim-btn-back { background: var(--surface2); color: var(--text-dim); } .bsim-btn-back:hover { background: var(--surface); color: var(--text); } .bsim-locked-banner { background: rgba(45,179,74,0.08); border: 1px solid var(--green); border-radius: 8px; padding: 0.9rem 1.1rem; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--green); letter-spacing: 0.06em; margin-bottom: 1.25rem; } .bsim-locked-banner small { font-family: 'Azeret Mono', monospace; font-size: 0.58rem; color: var(--text-muted); display: block; margin-top: 0.2rem; letter-spacing: 0.08em; font-weight: 400; } /* ── Bracket horizontal ── */ .bsim-htable-outer { margin-top: 0.75rem; } .bsim-htable-labels { display: flex; gap: 8px; margin-bottom: 5px; } .bsim-hcol-lbl { flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--gold); text-align: center; } .bsim-htable { display: flex; gap: 8px; height: 660px; } .bsim-hcol { flex: 1; display: flex; flex-direction: column; min-width: 0; } .bsim-hcol-inner { flex: 1; display: flex; flex-direction: column; } .bsim-hmwrap { display: flex; align-items: center; padding: 2px 0; box-sizing: border-box; position: relative; overflow: visible; } .bsim-hmwrap > .bsim-match-card { width: 100%; } .bsim-hmwrap > .bsim-match-card .bsim-match-slot { min-height: 26px; padding: 0.2rem 0.35rem; font-size: 0.72rem; } .bsim-hmwrap.wr32 { flex: 1; } .bsim-hmwrap.wr16 { flex: 2; } .bsim-hmwrap.wqf { flex: 4; } .bsim-hmwrap.wsf { flex: 8; } .bsim-center-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 0.62rem; letter-spacing: 0.12em; color: var(--gold); text-align: center; margin-bottom: 4px; } .bsim-center-lbl-muted { font-family: 'Bebas Neue', sans-serif; font-size: 0.62rem; letter-spacing: 0.12em; color: var(--text-muted); text-align: center; margin-bottom: 4px; } /* ── Bracket connector lines ── */ .bsim-hmwrap.ls.pf::after, .bsim-hmwrap.ls.pl::after, .bsim-hmwrap.rs.pf::after, .bsim-hmwrap.rs.pl::after, .bsim-hmwrap.ls.sf-exit::after, .bsim-hmwrap.rs.sf-exit::after { content: ''; position: absolute; } /* Left side exits right — pf (top of pair) */ .bsim-hmwrap.ls.pf::after { top: 50%; bottom: 0; right: -9px; width: 9px; border-right: 1px solid rgba(212,175,55,0.45); border-bottom: 1px solid rgba(212,175,55,0.45); border-bottom-right-radius: 2px; } /* Left side exits right — pl (bottom of pair) */ .bsim-hmwrap.ls.pl::after { top: 0; bottom: 50%; right: -9px; width: 9px; border-right: 1px solid rgba(212,175,55,0.45); border-top: 1px solid rgba(212,175,55,0.45); border-top-right-radius: 2px; } /* Right side exits left — pf (top of pair) */ .bsim-hmwrap.rs.pf::after { top: 50%; bottom: 0; left: -9px; width: 9px; border-left: 1px solid rgba(212,175,55,0.45); border-bottom: 1px solid rgba(212,175,55,0.45); border-bottom-left-radius: 2px; } /* Right side exits left — pl (bottom of pair) */ .bsim-hmwrap.rs.pl::after { top: 0; bottom: 50%; left: -9px; width: 9px; border-left: 1px solid rgba(212,175,55,0.45); border-top: 1px solid rgba(212,175,55,0.45); border-top-left-radius: 2px; } /* SF → center column horizontal stubs */ .bsim-hmwrap.ls.sf-exit::after { top: 50%; right: -9px; width: 9px; height: 1px; background: rgba(212,175,55,0.45); transform: translateY(-50%); } .bsim-hmwrap.rs.sf-exit::after { top: 50%; left: -9px; width: 9px; height: 1px; background: rgba(212,175,55,0.45); transform: translateY(-50%); } /* Center column — bracket connecting to SF on both sides */ .bsim-hcol-center { position: relative; overflow: visible; } .bsim-hcol-center::before, .bsim-hcol-center::after { content: ''; position: absolute; width: 9px; top: 44%; bottom: 44%; } .bsim-hcol-center::before { left: -9px; border-right: 1px solid rgba(212,175,55,0.45); border-top: 1px solid rgba(212,175,55,0.45); border-bottom: 1px solid rgba(212,175,55,0.45); border-top-right-radius: 2px; border-bottom-right-radius: 2px; } .bsim-hcol-center::after { right: -9px; border-left: 1px solid rgba(212,175,55,0.45); border-top: 1px solid rgba(212,175,55,0.45); border-bottom: 1px solid rgba(212,175,55,0.45); border-top-left-radius: 2px; border-bottom-left-radius: 2px; } /* ── Bracket countdown ── */ .bsim-cd-bar { background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.28); border-radius: 10px; padding: 0.9rem 1.2rem 0.75rem; margin-bottom: 1rem; text-align: center; } .bsim-cd-label { font-family: 'Azeret Mono', monospace; font-size: 0.58rem; letter-spacing: 0.14em; color: var(--text-muted); margin-bottom: 0.45rem; } .bsim-cd-digits { display: flex; justify-content: center; gap: 0.6rem; align-items: flex-start; } .bsim-cd-unit { display: flex; flex-direction: column; align-items: center; gap: 0.08rem; } .bsim-cd-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; line-height: 1; color: var(--gold); letter-spacing: 0.04em; } .bsim-cd-val.urgent { color: var(--red); } .bsim-cd-ulbl { font-family: 'Azeret Mono', monospace; font-size: 0.45rem; letter-spacing: 0.12em; color: var(--text-muted); } .bsim-cd-sep { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1.1; color: rgba(212,175,55,0.35); } </style> </head> <body> <div class=\"page-bg\" aria-hidden=\"true\"> <div class=\"page-bg-orb page-bg-orb-1\"></div> <div class=\"page-bg-orb page-bg-orb-2\"></div> <div class=\"page-bg-orb page-bg-orb-3\"></div> </div> <!-- ──────────────── HERO ──────────────── --> <section class=\"hero\" id=\"hero\"> <div class=\"hero-bg\"></div> <div class=\"hero-img-bg\"></div> <div class=\"hero-lines\"></div> <div class=\"hero-content\"> <p class=\"hero-eyebrow\">Pronostico — Édition officielle</p> <h1 class=\"hero-title\"> COUPE<br>DU MONDE<br><span>2026</span> </h1> <p class=\"hero-subtitle\">Pronostique. Rivalise. Triomphe.</p> <div class=\"hero-cta\"> <button class=\"btn-primary\" id=\"btn-join\" onclick=\"openModal('login')\">Rejoindre la ligue</button> <button class=\"btn-secondary\" onclick=\"scrollToApp()\">Voir les matchs</button> </div> </div> </section> <!-- ──────────────── STICKY HEADER (ticker + nav) ──────────────── --> <div class=\"sticky-header\"> <div class=\"stats-bar\"> <div class=\"stats-ticker\" id=\"ticker\"></div> </div> <!-- ─────────